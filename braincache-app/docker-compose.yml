services:

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  braincache:
    build: .
    ports:
      - "7337:7337"
    volumes:
      - braincache-data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - PIPER_BINARY=/opt/piper/piper
      - PIPER_MODEL=/opt/piper/voices/en_US-lessac-medium.onnx
      - WHISPER_BINARY=/opt/whisper/main
      - WHISPER_MODEL=/opt/whisper/models/ggml-base.en.bin
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
  braincache-data:
